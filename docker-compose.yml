services:
  kommo-dispatcher:
    build: .
    container_name: kommo-dispatcher
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - kommo-data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/kommo_chat.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  kommo-data:
